<!DOCTYPE html>
<html>
<head>
<title>Magic 8 Ball</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, #5b2cff55, transparent 35%),
    radial-gradient(circle at bottom, #ff4fd855, transparent 35%),
    linear-gradient(135deg,#12001f,#050008);
  color:white;
  font-family: Arial, sans-serif;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{
  font-size:2rem;
  margin-bottom:28px;
  text-shadow:0 0 15px #b36cff;
}

.ball{
  width:270px;
  height:270px;
  background:
    radial-gradient(circle at 35% 25%, #777, #111 35%, #000 70%);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 35px #9b5cff,
    inset -20px -20px 40px #000;
}

.ball.shake{
  animation:shake .45s ease-in-out 4;
}

.answer{
  width:145px;
  height:145px;
  background:
    radial-gradient(circle,#3a1b82,#17002f);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  font-size:18px;
  font-weight:bold;
  box-shadow:inset 0 0 20px #8d6cff;
}

button{
  margin-top:34px;
  font-size:1.1rem;
  padding:15px 30px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#b45cff,#ff5bd7);
  color:white;
  font-weight:bold;
  box-shadow:0 10px 25px #9b5cff66;
}

button:active{
  transform:scale(.95);
}

@keyframes shake{
  0%{transform:rotate(0deg)}
  25%{transform:rotate(6deg)}
  50%{transform:rotate(-6deg)}
  75%{transform:rotate(4deg)}
  100%{transform:rotate(0deg)}
}
</style>
</head>

<body>

<h1>Ask the Magic 8 Ball ✨</h1>

<div class="ball" id="ball">
  <div class="answer" id="answer">Tap Reveal</div>
</div>

<button onclick="reveal()">Reveal Answer</button>

<script>
const answers = [
  "Yes",
  "No",
  "Maybe",
  "Ask again later",
  "Without a doubt",
  "Absolutely not",
  "Signs point to yes",
  "Very likely",
  "Not today",
  "Try again tomorrow",
  "The vibes say yes",
  "The universe says no",
  "Probably",
  "Don't count on it",
  "100% yes"
];

let revealing = false;

function reveal(){
  if(revealing) return;
  revealing = true;

  const ball = document.getElementById("ball");
  const answer = document.getElementById("answer");

  answer.innerText = "shaking...";

  ball.classList.add("shake");

  setTimeout(() => {
    const random = Math.floor(Math.random() * answers.length);
    answer.innerText = answers[random];

    answer.animate([
      {transform:"scale(.8)", opacity:.4},
      {transform:"scale(1.15)", opacity:1},
      {transform:"scale(1)", opacity:1}
    ],{
      duration:450
    });

    ball.classList.remove("shake");
    revealing = false;
  }, 1800);
}
</script>

</body>
</html>
